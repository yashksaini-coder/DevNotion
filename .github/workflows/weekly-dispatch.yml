name: Weekly Blog Dispatch

on:
  schedule:
    # Every Sunday at 08:00 UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      week:
        description: 'Week start date (YYYY-MM-DD), defaults to last Monday'
        required: false
        type: string

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate week input
        if: inputs.week != ''
        env:
          WEEK_INPUT: ${{ inputs.week }}
        run: |
          if ! echo "$WEEK_INPUT" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "::error::Invalid week format. Expected YYYY-MM-DD"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run weekly dispatch
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          PUBLISH_TARGETS: notion,devto
          WEEK_INPUT: ${{ inputs.week }}
        run: |
          if [ -n "$WEEK_INPUT" ]; then
            npx tsx src/index.ts "--week=$WEEK_INPUT"
          else
            npx tsx src/index.ts
          fi

      - name: Commit blog log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update blog log for $(date -u +%Y-%m-%d)"
          git push
